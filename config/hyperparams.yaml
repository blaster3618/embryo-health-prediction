# ============================================================
# Embryo Health Prediction – Central Hyperparameter Config
# ============================================================

training:
  batch_size: 32
  learning_rate: 0.0001
  num_epochs: 100
  patience: 20          # early-stopping patience
  scheduler_factor: 0.5
  scheduler_patience: 5

data:
  # Default paths (relative to FYP root).
  # Override with --train / --val / --test CLI flags.
  train_path: "data/embryo/train_data"
  val_path:   "data/embryo/val_data"
  test_path:  "data/embryo/test_data"
  imagenet_mean: [0.485, 0.456, 0.406]
  imagenet_std:  [0.229, 0.224, 0.225]

augmentation:
  rotation_degrees: 360
  horizontal_flip: 0.5
  vertical_flip: 0.5
  gaussian_blur_kernel: [5, 9]
  gaussian_blur_sigma: [0.1, 2.0]
  brightness_jitter: 0.1
  contrast_jitter: 0.1

output:
  saved_models_dir: "saved_models"
  results_dir:      "results"
